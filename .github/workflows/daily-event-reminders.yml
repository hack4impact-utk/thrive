name: Daily Event Reminders
on:
  schedule:
    # Runs at 1:00 PM UTC (8:00 AM EST) every day
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send Day-Of Event Reminder Emails
        run: |
          curl -X POST \
          ${{ secrets.APP_URL }}/api/cron/reminders \
          -H "x-api-key: ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json"
